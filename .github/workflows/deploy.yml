name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build
        env:
          VITE_GISCUSS_REPO: ${{ secrets.VITE_GISCUSS_REPO }}
          VITE_GISCUSS_REPO_ID: ${{ secrets.VITE_GISCUSS_REPO_ID }}
          VITE_GISCUSS_CATEGORY: ${{ secrets.VITE_GISCUSS_CATEGORY }}
          VITE_GISCUSS_CATID: ${{ secrets.VITE_GISCUSS_CATID }}
          VITE_EDITOR_PIN: ${{ secrets.VITE_EDITOR_PIN }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
